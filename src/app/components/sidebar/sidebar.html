<aside class="sidebar">
  <div class="sidebar-logo">
    <span class="logo-icon">🏋️</span>
    <span class="logo-text">Marhaba<span>PH</span></span>
  </div>

  <nav class="sidebar-nav">
    <a routerLink="/home" routerLinkActive="active" class="nav-item">
      <img src="/icon/home.png" class="nav-icon-img" alt="home" />
      <span class="nav-label">Home</span>
    </a>
    <a routerLink="/planner" routerLinkActive="active" class="nav-item">
      <img src="/icon/calendar.png" class="nav-icon-img" alt="planner" />
      <span class="nav-label">Planner</span>
    </a>
    <a routerLink="/exercises" routerLinkActive="active" class="nav-item">
      <img src="/icon/training.png" class="nav-icon-img" alt="exercises" />
      <span class="nav-label">Exercises</span>
    </a>
    <a routerLink="/about" routerLinkActive="active" class="nav-item">
      <img src="/icon/target.png" class="nav-icon-img" alt="about" />
      <span class="nav-label">About</span>
    </a>
  </nav>

  <div class="sidebar-bottom">
    <div class="user-info">
      <div class="user-avatar">
        {{ authService.getUsername().charAt(0).toUpperCase() }}
      </div>
      <div class="user-details">
        <span class="user-name">{{ authService.getUsername() }}</span>
        <span class="user-sub">Gym Member</span>
      </div>
    </div>
    <button class="btn-logout" (click)="logout()">
      <span>🚪</span>
      <span>Logout</span>
    </button>
  </div>
</aside>
