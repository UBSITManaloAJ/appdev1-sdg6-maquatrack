<header class="navbar" *ngIf="authService.isLoggedIn()">
  <div class="brand">
    <span class="brand-icon">🏋️</span>
    <span class="brand-name">Marhaba <span class="brand-ph">PH</span></span>
  </div>

  <nav>
    <a routerLink="/home"       routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}">Home</a>
    <a routerLink="/planner"    routerLinkActive="active">Planner</a>
    <a routerLink="/my-program" routerLinkActive="active">My Program</a>
    <a routerLink="/exercises"  routerLinkActive="active">Exercises</a>
    <a routerLink="/about"      routerLinkActive="active">About</a>
  </nav>

  <div class="navbar-right">
    <span class="username">👤 {{ authService.getUsername() }}</span>
    <button class="btn-logout" (click)="logout()">Logout</button>
  </div>
</header>
