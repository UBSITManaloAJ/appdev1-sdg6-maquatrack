<header class="navbar">
  <div class="brand">
    <span class="brand-icon">💧</span>
    <span class="brand-name">MaquaTrack <span class="brand-ph">PH</span></span>
  </div>

  <nav *ngIf="authService.isLoggedIn()">
    <a routerLink="/home"       routerLinkActive="active">Home</a>
    <a routerLink="/dashboard"  routerLinkActive="active">Dashboard</a>
    <a routerLink="/workout"    routerLinkActive="active">Workout</a>
    <a routerLink="/tracker"    routerLinkActive="active">Water</a>
    <a routerLink="/calendar"   routerLinkActive="active">Calendar</a>
    <a routerLink="/challenges" routerLinkActive="active">Challenges</a>
    <a routerLink="/sdg-info"   routerLinkActive="active">SDG</a>
  </nav>

  <div class="navbar-right" *ngIf="authService.isLoggedIn()">
    <span class="rank-badge">{{ authService.getRank() }}</span>
    <span class="exp-badge">{{ authService.getExp() }} EXP</span>
    <span class="username">{{ authService.getUsername() }}</span>
    <button class="btn-logout" (click)="logout()">Logout</button>
  </div>
</header>
