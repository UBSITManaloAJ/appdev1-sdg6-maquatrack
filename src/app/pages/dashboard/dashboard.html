<div class="dashboard">
  <div class="dashboard-header">
    <h1>📊 Global Health Dashboard</h1>
    <p>Population data from Asian countries — supporting SDG 3 awareness</p>
  </div>

  <ng-container *ngIf="state$ | async as state">
    <div class="loading" *ngIf="state.loading">
      <div class="spinner"></div>
      <p>Loading health data...</p>
    </div>

    <div class="error" *ngIf="state.error">
      <p>⚠️ Failed to load data. Please check your connection.</p>
    </div>

    <div class="cards-grid" *ngIf="!state.loading && !state.error">
      <div class="card" *ngFor="let item of state.data">
        <div class="card-flag">
          <img [src]="item.flag" [alt]="item.country + ' flag'" />
        </div>
        <div class="card-body">
          <h3>{{ item.country }}</h3>
          <p class="capital">🏙️ {{ item.capital }}</p>
          <p class="region">📍 {{ item.region }}</p>
          <p class="population">👥 {{ item.population | number }}</p>
        </div>
      </div>
    </div>
  </ng-container>
</div>
