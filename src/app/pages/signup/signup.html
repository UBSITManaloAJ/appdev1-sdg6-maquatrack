<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <span>🏋️</span>
      <h1>Marhaba <span>PH</span></h1>
    </div>
    <p class="auth-sub">Start your fitness journey today</p>

    <div class="error-msg" *ngIf="error">{{ error }}</div>

    <div class="form-group">
      <label>Username</label>
      <input type="text" [(ngModel)]="username" placeholder="Choose a username" />
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" [(ngModel)]="password" placeholder="Create a password" />
    </div>

    <div class="form-group">
      <label>Confirm Password</label>
      <input type="password" [(ngModel)]="confirm" placeholder="Repeat your password" />
    </div>

    <button class="btn-primary" (click)="signup()">Create Account</button>

    <p class="auth-link">
      Already have an account? <a routerLink="/login">Login</a>
    </p>
  </div>
</div>
